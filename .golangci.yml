version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - copyloopvar
    - gocritic
    - gosec
    - misspell
    - prealloc
    - unconvert
    - unparam
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - gosec
          - unparam
          - prealloc
          - gocritic
      - path: internal/shared/util.go
        linters:
          - gosec

formatters:
  enable:
    - gofmt
